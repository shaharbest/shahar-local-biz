{{ if hugo.Data.testimonials.testimonials }}
<div class="strip strip-grey">
  <div class="container pt-6 pb-6 pt-md-10 pb-md-10">
    <div class="row justify-content-center">
      <div class="col-12 text-center mb-4">
        <h2>What Our Customers Say</h2>
      </div>
    </div>
    <div class="row justify-content-center">
      {{ range hugo.Data.testimonials.testimonials }}
      <div class="col-12 col-md-6 col-lg-4 mb-4">
        <div class="card h-100 p-4">
          <blockquote class="mb-3" style="border-left: 4px solid var(--color-primary, #629e27); padding-left: 1rem;">
            <p class="mb-2">"{{ .quote }}"</p>
          </blockquote>
          <footer>
            <strong>{{ .name }}</strong>
            {{ if .location }}<span class="text-muted"> — {{ .location }}</span>{{ end }}
            {{ if .service }}<br><small class="text-muted">{{ .service }}</small>{{ end }}
          </footer>
        </div>
      </div>
      {{ end }}
    </div>
  </div>
</div>
{{ end }}
