{{ if hugo.Data.hours.hours }}
<style>
  .hours-list {
    max-width: 320px;
    margin: 0 auto;
    border-top: 3px solid #629e27;
    background: #fff;
    box-shadow: 0 2px 10px rgba(26, 39, 68, 0.08);
    border-radius: 0 0 4px 4px;
    padding: 0 24px;
  }
  .hours-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 11px 0;
    border-bottom: 1px solid #f4f9ef;
  }
  .hours-row:last-child {
    border-bottom: none;
  }
  .hours-day {
    font-weight: 600;
    color: #1a2744;
    font-size: 0.95rem;
  }
  .hours-time {
    color: #629e27;
    font-weight: 500;
    font-size: 0.95rem;
  }
  .hours-row.is-closed .hours-time {
    color: #9baa9e;
    font-style: italic;
    font-weight: 400;
  }
</style>
<div id="hours" class="strip">
  <div class="container pt-6 pb-6 pt-md-10 pb-md-10">
    <div class="row justify-content-center">
      <div class="col-12 text-center mb-4">
        <h2>Hours</h2>
      </div>
    </div>
    <div class="row justify-content-center">
      <div class="col-12 col-md-6 col-lg-4">
        <div class="hours-list">
          {{ range hugo.Data.hours.hours }}
          <div class="hours-row{{ if .closed }} is-closed{{ end }}">
            <span class="hours-day">{{ .day }}</span>
            <span class="hours-time">{{ if .closed }}Closed{{ else }}{{ .opens }} – {{ .closes }}{{ end }}</span>
          </div>
          {{ end }}
        </div>
      </div>
    </div>
  </div>
</div>
{{ end }}
